<!DOCTYPE html>
<html lang="en">
<head>

    <script src="Dogão.js"></script>
    <link rel="stylesheet" href="Dogão.css">

<body>

    <main>

            <label for="produto5">Refrigerante 1l- R$8,00</label>

            <button onclick="Total()">Calcular</button><br>

            <label class="saida"for="saida">O total do seu pedido é:</label>

        </section>
    </main>

</body>
