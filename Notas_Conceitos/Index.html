<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Conceito</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <header>
        Notas Conceito
    </header>

    <main>
        <section>
            <h1>Notas Conceito</h1>

            <label for="inputRA" id="labelDoRA">Ra:</label>
            <input type="text" id="inputRA"><br>

            <label for="inputNome" id="labelDoNome">Nome:</label>
            <input type="text" id="inputNome"><br>

            <label for="inputN1" id="labeldaN1">Nota 1:</label>
            <input type="number" id="inputN1"><br>

            <label for="inputN2" id="labeldaN2">Nota 2:</label>
            <input type="number" id="inputN2"><br>

            <label for="inputN3" id="labeldaN3">Nota 3:</label>
            <input type="number" id="inputN3"><br>

            <label for="inputN4" id="labeldaN4">Nota 4:</label>
            <input type="number" id="inputN4"><br>

            <label for="inputME" id="labeldoME">Média dos exercícios :</label>
            <input type="number" id="inputME"><br>


            <button onclick="funcaoMA()">Calcular</button>

            <div class="resultado">
                <p id="labelAluno"><strong>Informações Aluno:</strong> <span id="respAluno">-</span></p>
                <p id="labelMA"><strong>Média de aproveitamento:</strong> <span id="respMA">0</span></p>
                <p id="labelConceito"><strong>Conceito:</strong> <span id="respConceito">-</span></p>
            </div>
        </section>
        
        
    </main>

    <footer id="footer">
        <span id="mensagem">Preencha os valores e calcule</span>
    </footer>

    <script src="Script.js"></script>

</body>

</html>
